<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Studio - Draw & Analyze Shapes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .status-badge {
            background: #10b981;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .main {
            display: flex;
            flex: 1;
            gap: 10px;
            padding: 10px;
            background: #0f0c29;
            overflow: hidden;
        }

        .sidebar {
            width: 220px;
            background: #1a0e3d;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            overflow-y: auto;
            padding: 0;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #667eea;
        }

        .panel {
            padding: 15px;
            border-bottom: 1px solid #2a2a4a;
        }

        .panel h2 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: #f093fb;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        button {
            padding: 10px 12px;
            border: 1px solid #2a2a4a;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(240, 147, 251, 0.4);
            border-color: #f093fb;
        }

        button.active {
            box-shadow: 0 0 20px #f093fb;
            border-color: #f093fb;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .color-btn {
            width: 100%;
            aspect-ratio: 1;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0;
        }

        .color-btn:hover {
            transform: scale(1.1);
            border-color: white;
        }

        .color-btn.active {
            border-color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .checkbox {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 12px;
            cursor: pointer;
            color: #a0a0a0;
        }

        .checkbox input {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            accent-color: #f093fb;
        }

        .center {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .canvas-wrapper {
            flex: 1;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .info-panel {
            background: #1a0e3d;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 15px;
            height: 100px;
        }

        .info-panel h3 {
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #f093fb;
        }

        .info-content p {
            font-size: 11px;
            margin-bottom: 3px;
            color: #a0a0a0;
            font-family: monospace;
        }

        .right-sidebar {
            width: 220px;
            background: #1a0e3d;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            overflow-y: auto;
            padding: 0;
        }

        .stats-box {
            background: #0f0c29;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            padding: 10px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 11px;
        }

        .stat-label {
            color: #a0a0a0;
        }

        .stat-value {
            color: #f093fb;
            font-weight: bold;
        }

        footer {
            background: #1a0e3d;
            border-top: 1px solid #2a2a4a;
            padding: 10px;
            text-align: center;
            font-size: 10px;
            color: #a0a0a0;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a0e3d;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 30px;
            width: 300px;
        }

        .modal-content h2 {
            margin-bottom: 15px;
            color: #f093fb;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #0f0c29;
            border: 1px solid #2a2a4a;
            color: white;
            border-radius: 4px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 Geometry Studio</h1>
            <div class="status-badge" id="status">Ready</div>
        </header>

        <div class="main">
            <aside class="sidebar">
                <div class="panel">
                    <h2>SHAPES</h2>
                    <div class="button-group">
                        <button class="shape-btn active" data-shape="triangle">△ Triangle</button>
                        <button class="shape-btn" data-shape="square">▢ Square</button>
                        <button class="shape-btn" data-shape="rectangle">▭ Rectangle</button>
                        <button class="shape-btn" data-shape="circle">● Circle</button>
                        <button class="shape-btn" data-shape="polygon">◈ Polygon</button>
                    </div>
                </div>

                <div class="panel">
                    <h2>COLORS</h2>
                    <div class="color-grid">
                        <button class="color-btn active" style="background: #FF6B6B" data-color="#FF6B6B"></button>
                        <button class="color-btn" style="background: #4ECDC4" data-color="#4ECDC4"></button>
                        <button class="color-btn" style="background: #45B7D1" data-color="#45B7D1"></button>
                        <button class="color-btn" style="background: #FFA502" data-color="#FFA502"></button>
                        <button class="color-btn" style="background: #95E1D3" data-color="#95E1D3"></button>
                        <button class="color-btn" style="background: #F38181" data-color="#F38181"></button>
                        <button class="color-btn" style="background: #AA96DA" data-color="#AA96DA"></button>
                        <button class="color-btn" style="background: #FCBAD3" data-color="#FCBAD3"></button>
                    </div>
                </div>

                <div class="panel">
                    <h2>TOOLS</h2>
                    <div class="button-group">
                        <button id="rotate-btn">🔄 Rotate</button>
                        <button id="scale-btn">📏 Scale</button>
                        <button id="mirror-h-btn">↔ Mirror H</button>
                        <button id="mirror-v-btn">↕ Mirror V</button>
                        <button id="clear-btn">🗑 Clear</button>
                    </div>
                </div>

                <div class="panel">
                    <h2>OPTIONS</h2>
                    <label class="checkbox">
                        <input type="checkbox" id="grid-toggle" checked>
                        <span>Show Grid</span>
                    </label>
                    <label class="checkbox">
                        <input type="checkbox" id="snap-toggle" checked>
                        <span>Snap to Grid</span>
                    </label>
                </div>
            </aside>

            <section class="center">
                <div class="canvas-wrapper">
                    <canvas id="canvas" width="800" height="600"></canvas>
                </div>

                <div class="info-panel">
                    <h3>SHAPE INFO</h3>
                    <div class="info-content">
                        <p id="shape-name">No shape</p>
                        <p id="shape-stats">Points: 0</p>
                        <p id="shape-formula"></p>
                    </div>
                </div>
            </section>

            <aside class="right-sidebar">
                <div class="panel">
                    <h2>QUICK ACTIONS</h2>
                    <div class="button-group">
                        <button id="undo-btn">↶ Undo (Z)</button>
                        <button id="finish-btn">✓ Finish (F)</button>
                        <button id="save-btn">💾 Save</button>
                    </div>
                </div>

                <div class="panel">
                    <h2>STATS</h2>
                    <div class="stats-box">
                        <div class="stat-item">
                            <span class="stat-label">Points:</span>
                            <span class="stat-value" id="stat-points">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Mode:</span>
                            <span class="stat-value" id="stat-mode">▲</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Color:</span>
                            <span class="stat-value" id="stat-color">■</span>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <h2>COORDINATES</h2>
                    <p style="font-size: 11px; color: #a0a0a0; margin: 5px 0;" id="coords">X: 0, Y: 0</p>
                </div>
            </aside>
        </div>

        <footer>
            © 2024 Geometry Studio • <a href="https://github.com/zhirkoalexander-maker/bender" style="color: #f093fb; text-decoration: none;">GitHub</a>
        </footer>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Input</h2>
            <input type="number" id="modal-input" placeholder="Value">
            <div class="modal-buttons">
                <button id="modal-ok">OK</button>
                <button id="modal-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            currentShape: 'triangle',
            currentColor: '#FF6B6B',
            points: [],
            shapes: [],
            gridEnabled: true,
            snapEnabled: true,
        };

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const GRID_SIZE = 20;
        const POINT_SIZE = 8;

        // Setup
        document.addEventListener('DOMContentLoaded', () => {
            setupListeners();
            redraw();
        });

        function setupListeners() {
            document.querySelectorAll('.shape-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.currentShape = btn.dataset.shape;
                    state.points = [];
                    updateUI();
                    redraw();
                });
            });

            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.currentColor = btn.dataset.color;
                    updateUI();
                });
            });

            document.getElementById('rotate-btn').addEventListener('click', () => 
                showModal('Rotate', 'Angle:', v => rotateShape(parseFloat(v))));
            document.getElementById('scale-btn').addEventListener('click', () => 
                showModal('Scale', 'Factor:', v => scaleShape(parseFloat(v))));
            document.getElementById('mirror-h-btn').addEventListener('click', () => mirrorShape('h'));
            document.getElementById('mirror-v-btn').addEventListener('click', () => mirrorShape('v'));
            document.getElementById('clear-btn').addEventListener('click', clearAll);

            document.getElementById('undo-btn').addEventListener('click', undo);
            document.getElementById('finish-btn').addEventListener('click', finishShape);
            document.getElementById('save-btn').addEventListener('click', saveDrawing);

            document.getElementById('grid-toggle').addEventListener('change', e => { 
                state.gridEnabled = e.target.checked; 
                redraw(); 
            });
            document.getElementById('snap-toggle').addEventListener('change', e => { 
                state.snapEnabled = e.target.checked; 
            });

            canvas.addEventListener('click', onCanvasClick);
            canvas.addEventListener('dblclick', finishShape);
            canvas.addEventListener('mousemove', onCanvasMouseMove);

            document.addEventListener('keydown', e => {
                if (e.key === 'z' || e.key === 'Z') undo();
                if (e.key === 'f' || e.key === 'F') finishShape();
                if (e.key === 'q' || e.key === 'Q') clearAll();
            });

            document.getElementById('modal-ok').addEventListener('click', handleModalOk);
            document.getElementById('modal-cancel').addEventListener('click', hideModal);
            document.getElementById('modal-input').addEventListener('keydown', e => { 
                if (e.key === 'Enter') handleModalOk(); 
            });
        }

        function onCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;

            if (state.snapEnabled) {
                x = Math.round(x / GRID_SIZE) * GRID_SIZE;
                y = Math.round(y / GRID_SIZE) * GRID_SIZE;
            }

            state.points.push([x, y]);

            if (state.currentShape === 'square' && state.points.length === 2) {
                createSquare();
                finishShape();
            } else if (state.currentShape === 'rectangle' && state.points.length === 2) {
                createRectangle();
                finishShape();
            } else if (state.currentShape === 'circle' && state.points.length === 2) {
                finishShape();
            } else if (state.currentShape === 'triangle' && state.points.length === 3) {
                analyzeShape();
            }

            updateUI();
            redraw();
        }

        function onCanvasMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.round(e.clientX - rect.left);
            const y = Math.round(e.clientY - rect.top);
            document.getElementById('coords').textContent = `X: ${x}, Y: ${y}`;
        }

        function redraw() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (state.gridEnabled) {
                ctx.strokeStyle = '#e0e0e0';
                ctx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += GRID_SIZE) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i < canvas.height; i += GRID_SIZE) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(canvas.width, i);
                    ctx.stroke();
                }
            }

            state.shapes.forEach(shape => drawShape(shape.points, shape.color, false));

            if (state.points.length > 0) {
                if (state.currentShape === 'circle' && state.points.length >= 1) {
                    const [cx, cy] = state.points[0];
                    if (state.points.length >= 2) {
                        const [px, py] = state.points[1];
                        const radius = Math.hypot(px - cx, py - cy);
                        ctx.strokeStyle = state.currentColor;
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.fillStyle = state.currentColor + '30';
                        ctx.fill();
                    }
                } else {
                    ctx.strokeStyle = state.currentColor;
                    ctx.lineWidth = 3;
                    for (let i = 0; i < state.points.length - 1; i++) {
                        ctx.beginPath();
                        ctx.moveTo(state.points[i][0], state.points[i][1]);
                        ctx.lineTo(state.points[i + 1][0], state.points[i + 1][1]);
                        ctx.stroke();
                    }
                }

                state.points.forEach((point, idx) => {
                    drawPoint(point[0], point[1], idx + 1);
                });
            }
        }

        function drawShape(points, color, dashed = false) {
            if (points.length < 2) return;

            ctx.strokeStyle = color;
            ctx.lineWidth = 3;

            if (dashed) ctx.setLineDash([5, 5]);

            for (let i = 0; i < points.length; i++) {
                const p1 = points[i];
                const p2 = points[(i + 1) % points.length];
                ctx.beginPath();
                ctx.moveTo(p1[0], p1[1]);
                ctx.lineTo(p2[0], p2[1]);
                ctx.stroke();
            }

            ctx.setLineDash([]);

            if (points.length >= 3) {
                ctx.fillStyle = color + '20';
                ctx.beginPath();
                ctx.moveTo(points[0][0], points[0][1]);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i][0], points[i][1]);
                }
                ctx.closePath();
                ctx.fill();
            }
        }

        function drawPoint(x, y, label = '') {
            ctx.fillStyle = '#FFFF00';
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y, POINT_SIZE, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            if (label) {
                ctx.fillStyle = '#000000';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(label, x, y);
            }
        }

        function createSquare() {
            if (state.points.length < 2) return;
            const [x1, y1] = state.points[0];
            const [x2, y2] = state.points[1];
            const side = Math.hypot(x2 - x1, y2 - y1);
            const dx = (x2 - x1) / side;
            const dy = (y2 - y1) / side;
            const px = -dy;
            const py = dx;

            state.points = [
                [x1, y1],
                [x1 + dx * side, y1 + dy * side],
                [x1 + dx * side + px * side, y1 + dy * side + py * side],
                [x1 + px * side, y1 + py * side]
            ];
        }

        function createRectangle() {
            if (state.points.length < 2) return;
            const [x1, y1] = state.points[0];
            const [x2, y2] = state.points[1];
            state.points = [[x1, y1], [x2, y1], [x2, y2], [x1, y2]];
        }

        function analyzeShape() {
            if (state.points.length < 2) return;

            const sides = [];
            for (let i = 0; i < state.points.length; i++) {
                const p1 = state.points[i];
                const p2 = state.points[(i + 1) % state.points.length];
                const dist = Math.hypot(p2[0] - p1[0], p2[1] - p1[1]);
                sides.push(dist);
            }

            const perimeter = sides.reduce((a, b) => a + b, 0);

            let area = 0;
            for (let i = 0; i < state.points.length; i++) {
                const p1 = state.points[i];
                const p2 = state.points[(i + 1) % state.points.length];
                area += p1[0] * p2[1] - p2[0] * p1[1];
            }
            area = Math.abs(area) / 2;

            const n = state.points.length;
            let shapeName = 'Polygon';
            if (n === 3) shapeName = 'Triangle';
            else if (n === 4) shapeName = 'Quadrilateral';

            document.getElementById('shape-name').textContent = `Shape: ${shapeName}`;
            document.getElementById('shape-stats').textContent = `Vertices: ${n} | Perimeter: ${perimeter.toFixed(1)}px | Area: ${area.toFixed(1)}px²`;
            document.getElementById('shape-formula').textContent = `Sides: ${sides.map(s => s.toFixed(0)).join(', ')}`;
        }

        function rotateShape(angle) {
            if (state.points.length < 2) { alert('Draw first'); return; }
            const cx = state.points.reduce((a, p) => a + p[0], 0) / state.points.length;
            const cy = state.points.reduce((a, p) => a + p[1], 0) / state.points.length;
            const rad = angle * Math.PI / 180;
            state.points = state.points.map(([x, y]) => [
                cx + (x - cx) * Math.cos(rad) - (y - cy) * Math.sin(rad),
                cy + (x - cx) * Math.sin(rad) + (y - cy) * Math.cos(rad)
            ]);
            redraw();
        }

        function scaleShape(factor) {
            if (state.points.length < 2 || factor <= 0) { alert('Draw first'); return; }
            const cx = state.points.reduce((a, p) => a + p[0], 0) / state.points.length;
            const cy = state.points.reduce((a, p) => a + p[1], 0) / state.points.length;
            state.points = state.points.map(([x, y]) => [
                cx + (x - cx) * factor,
                cy + (y - cy) * factor
            ]);
            redraw();
        }

        function mirrorShape(axis) {
            if (state.points.length < 2) { alert('Draw first'); return; }
            if (axis === 'h') {
                const cy = state.points.reduce((a, p) => a + p[1], 0) / state.points.length;
                state.points = state.points.map(([x, y]) => [x, 2 * cy - y]);
            } else {
                const cx = state.points.reduce((a, p) => a + p[0], 0) / state.points.length;
                state.points = state.points.map(([x, y]) => [2 * cx - x, y]);
            }
            redraw();
        }

        function finishShape() {
            if (state.points.length >= 3) {
                analyzeShape();
                state.shapes.push({ points: [...state.points], color: state.currentColor });
                state.points = [];
                updateUI();
                redraw();
                document.getElementById('status').textContent = '✓ Done!';
            } else {
                alert('Need 3+ points');
            }
        }

        function saveDrawing() {
            if (state.points.length === 0 && state.shapes.length === 0) {
                alert('Nothing to save');
                return;
            }
            const data = {
                timestamp: new Date().toLocaleString(),
                shapes: state.shapes,
            };
            const el = document.createElement('a');
            el.setAttribute('href', 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(data, null, 2)));
            el.setAttribute('download', `drawing_${Date.now()}.json`);
            el.style.display = 'none';
            document.body.appendChild(el);
            el.click();
            document.body.removeChild(el);
            document.getElementById('status').textContent = '✓ Saved!';
        }

        function clearAll() {
            state.points = [];
            state.shapes = [];
            updateUI();
            redraw();
            document.getElementById('status').textContent = 'Ready';
        }

        function undo() {
            if (state.points.length > 0) {
                state.points.pop();
            } else if (state.shapes.length > 0) {
                state.shapes.pop();
            }
            updateUI();
            redraw();
        }

        function updateUI() {
            document.getElementById('stat-points').textContent = state.points.length;
            document.getElementById('stat-color').style.color = state.currentColor;
        }

        let modalCallback = null;

        function showModal(title, label, callback) {
            modalCallback = callback;
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-input').placeholder = label;
            document.getElementById('modal-input').value = '';
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modal-input').focus();
        }

        function hideModal() {
            document.getElementById('modal').style.display = 'none';
            modalCallback = null;
        }

        function handleModalOk() {
            const value = document.getElementById('modal-input').value;
            if (value && modalCallback) {
                modalCallback(value);
            }
            hideModal();
        }
    </script>
</body>
</html>
